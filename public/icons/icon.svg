<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#grad)"/>
  <!-- Person stretching icon -->
  <g fill="white" transform="translate(106, 80) scale(0.6)">
    <!-- Head -->
    <circle cx="250" cy="80" r="50"/>
    <!-- Body -->
    <path d="M250 130 L250 280" stroke="white" stroke-width="30" stroke-linecap="round"/>
    <!-- Arms raised (stretching) -->
    <path d="M250 180 L150 100" stroke="white" stroke-width="30" stroke-linecap="round"/>
    <path d="M250 180 L350 100" stroke="white" stroke-width="30" stroke-linecap="round"/>
    <!-- Legs in lunge position -->
    <path d="M250 280 L180 420" stroke="white" stroke-width="30" stroke-linecap="round"/>
    <path d="M250 280 L350 380" stroke="white" stroke-width="30" stroke-linecap="round"/>
    <!-- Back foot -->
    <path d="M350 380 L400 400" stroke="white" stroke-width="25" stroke-linecap="round"/>
  </g>
  <!-- Anti-sitting symbol (crossed out chair) -->
  <g transform="translate(340, 340)">
    <circle cx="60" cy="60" r="55" fill="rgba(239, 68, 68, 0.9)" stroke="white" stroke-width="4"/>
    <!-- Simplified chair -->
    <path d="M35 45 L35 85 L85 85 L85 45" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <path d="M35 55 L85 55" stroke="white" stroke-width="6"/>
    <!-- X through it -->
    <path d="M25 25 L95 95" stroke="white" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
